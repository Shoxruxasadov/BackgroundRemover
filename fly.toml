app = 'backgroundremover-twilight-paper-2105'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[http_service.concurrency]
  type = "requests"
  hard_limit = 10
  soft_limit = 5

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
